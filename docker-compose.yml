
services:
  # ==========================================
  # FRONTEND (Angular / Nginx)
  # ==========================================
  frontend:
    build: 
      context: ./gtg-frontend
      dockerfile: Dockerfile
    container_name: gtg-frontend
    restart: unless-stopped
    ports:
      - "8080:80" # Maps port 8080 on server to port 80 in Nginx
    depends_on:
      - api # Ensures the API starts before the frontend

  # ==========================================
  # BACKEND (.NET API)
  # ==========================================
  api:
    build: 
      context: ./gtg-backend
      dockerfile: Dockerfile
    container_name: gtg-api
    restart: unless-stopped
    ports:
      # Maps port 5000 on server to port 8080 in the container 
      - "5000:8080" 
    environment:
      - ConnectionStrings__GameDbConnectionString=Server=database;Port=3306;database=gamenightdb;user=gamenight_user;password=${DB_PASSWORD}
      - Jwt__Key=${JWT_TOKEN_SECRET}
      - Telegram__BotToken=${TELEGRAM_BOT_KEY}
    depends_on:
      database:
        condition: service_healthy

 # ==========================================
  # DATABASE (MariaDB)
  # ==========================================
  database:
    image: mariadb:lts 
    container_name: gtg-database
    restart: unless-stopped
    environment:
      - MARIADB_DATABASE=gamenightdb
      - MARIADB_USER=gamenight_user
      - MARIADB_PASSWORD=${DB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"] 
      timeout: 5s
      retries: 10
      interval: 10s
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
